<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANVAYA — Design ERP</title>
<style>
  :root{
    --paper:#FBFAF7; --surface:#fff; --ink:#1B1E24; --graphite:#5A6473; --faint:#8A93A1;
    --line:#E7E4DC; --lineSoft:#F0EEE8; --blue:#26415E; --blueSoft:#EAF0F6;
    --amber:#9A6B1C; --amberSoft:#FAF1DD; --green:#3F7A52; --greenSoft:#E7F0E9;
    --red:#A8443B; --redSoft:#F8E8E6; --slate:#6B7686; --slateSoft:#EFF1F4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--paper);color:var(--ink);height:100vh;overflow:hidden}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  button{font:inherit;cursor:pointer;border:none;background:none}
  input,select{font:inherit;outline:none}
  a{color:inherit}

  /* ---------- login ---------- */
  .login{height:100vh;display:grid;place-items:center;background:var(--paper)}
  .login-card{width:380px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:32px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
  .brand .mark{width:34px;height:34px;border-radius:8px;background:var(--blue);display:grid;place-items:center;color:#fff;font-weight:700}
  .brand h1{font-size:17px;letter-spacing:-.3px}
  .brand .sub{font-size:9px;letter-spacing:1.5px;color:var(--faint)}
  label{font-size:12px;color:var(--faint);display:block;margin-bottom:6px}
  .input{width:100%;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--ink)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;background:var(--blue);color:#fff;width:100%}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--blue);width:auto;padding:7px 12px;font-weight:500;font-size:13px}
  .btn.green{background:var(--green)}
  .btn.small{padding:6px 10px;font-size:12px;width:auto}
  .hint{font-size:11px;color:var(--faint);margin-top:14px;line-height:1.6}
  .hint code{background:var(--slateSoft);padding:1px 5px;border-radius:4px;color:var(--slate)}
  .err{background:var(--redSoft);color:var(--red);font-size:12px;padding:8px 10px;border-radius:8px;margin-top:12px}

  /* ---------- shell ---------- */
  .app{display:flex;height:100vh}
  aside{width:236px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column}
  .side-head{padding:16px 18px;border-bottom:1px solid var(--line)}
  nav{flex:1;overflow-y:auto;padding:12px}
  .nav-group{font-size:9px;letter-spacing:1.5px;color:var(--faint);text-transform:uppercase;padding:0 8px;margin:14px 0 4px}
  .nav-item{display:flex;align-items:center;gap:10px;width:100%;border-radius:9px;padding:8px 10px;font-size:14px;color:var(--graphite);text-align:left;font-weight:500;margin-bottom:2px}
  .nav-item.on{background:var(--blueSoft);color:var(--blue);font-weight:600}
  .nav-item svg{width:16px;height:16px}
  .side-foot{padding:12px;border-top:1px solid var(--line)}

  main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  header.top{height:56px;flex-shrink:0;border-bottom:1px solid var(--line);background:var(--surface);display:flex;align-items:center;justify-content:space-between;padding:0 24px}
  .search{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:7px 12px;width:300px;color:var(--faint);font-size:13px}
  .who{display:flex;align-items:center;gap:8px}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--blueSoft);color:var(--blue);display:grid;place-items:center;font-size:12px;font-weight:600}
  .scope{padding:6px 24px;background:var(--amberSoft);color:var(--amber);font-size:12px;display:flex;align-items:center;gap:6px}
  .content{flex:1;overflow-y:auto;padding:24px}

  h2.page{font-size:20px;letter-spacing:-.3px}
  .page-sub{font-size:13px;color:var(--graphite);margin-top:2px}
  .row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px}
  .stat .l{font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--faint)}
  .stat .v{font-size:28px;font-weight:600;margin-top:8px;line-height:1}
  .stat .s{font-size:12px;color:var(--graphite);margin-top:4px}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px}
  .thead,.trow{display:grid;grid-template-columns:2fr 1.1fr 1fr 1.2fr .9fr;align-items:center;padding:12px 16px}
  .thead{border-bottom:1px solid var(--line);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--faint)}
  .thead{font-family:ui-monospace,monospace}
  .trow{border-bottom:1px solid var(--lineSoft)}
  .trow:last-child{border-bottom:none}
  .lead-name{font-size:14px;font-weight:500}
  .lead-id{font-size:10px;color:var(--faint)}
  .lead-brief{font-size:12px;color:var(--graphite);margin-top:2px}
  .src{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--graphite)}
  .val{font-size:14px;font-weight:500}
  .pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:2px 9px;font-size:12px;font-weight:500}
  .pill .dot{width:7px;height:7px;border-radius:50%}
  .right{display:flex;justify-content:flex-end}

  .newform{padding:16px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .newform .full{grid-column:1/-1;display:flex;gap:10px;justify-content:flex-end}
  .loading{padding:40px;text-align:center;color:var(--faint);font-size:14px}
  .empty{padding:40px;text-align:center;color:var(--faint);font-size:14px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:s .7s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes s{to{transform:rotate(360deg)}}
  .config-warn{margin:24px;padding:16px;border:1px dashed var(--amber);border-radius:12px;background:var(--amberSoft);color:var(--amber);font-size:13px;line-height:1.6}
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ========================================================================
   CONFIG — paste your deployed Web App URL here after running setup().
   It looks like: https://script.google.com/macros/s/AKfyc.../exec
======================================================================== */
const API_URL = "https://script.google.com/macros/s/AKfycby2w5apI-g5APQzCEP5sItoh9U1SwJXwi_LezVPFtJL1lsc3nYa6evslt8r62dMAmry/exec";

/* ---------- tiny inline icons ---------- */
const I = {
  pen:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>',
  dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg>',
  file:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
  folderK:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V4a2 2 0 0 1 2-2h5l2 3h7a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5h6l2 2"/><path d="M11 7h10"/><path d="M3 12h18M3 19h18"/></svg>',
  folder:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2z"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-3"/></svg>',
  bell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>',
  sign:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 11.5V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v14l4-4h6"/><path d="m14 18 4-4 3 3-4 4h-3z"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>',
  warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3z"/><path d="M12 9v4M12 17h.01"/></svg>',
};
const MODICON = {dashboard:I.dash,leads:I.users,requirement:I.file,proposals:I.sign,projects:I.folderK,tasks:I.list,documents:I.folder,reports:I.chart,notifications:I.bell};
const MODLABEL = {dashboard:'Dashboard',leads:'Leads (CRM)',requirement:'Requirement Forms',proposals:'Proposals & Fees',projects:'Projects',tasks:'My Tasks',documents:'Documents',reports:'Reports',notifications:'Notifications'};
const MODGROUP = {dashboard:'Workspace',notifications:'Workspace',leads:'Sales',requirement:'Sales',proposals:'Sales',projects:'Delivery',tasks:'Delivery',documents:'Records',reports:'Records'};
const LEAD_STATUSES=['New','Contacted','Meeting Scheduled','Site Visit','Proposal Sent','Negotiation','Approved','Rejected'];

const TONE={New:['--slate','--slateSoft'],Contacted:['--blue','--blueSoft'],'Meeting Scheduled':['--blue','--blueSoft'],'Site Visit':['--amber','--amberSoft'],'Proposal Sent':['--amber','--amberSoft'],Negotiation:['--amber','--amberSoft'],Approved:['--green','--greenSoft'],Rejected:['--red','--redSoft']};
const inr=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const cssv=v=>getComputedStyle(document.documentElement).getPropertyValue(v);

/* ---------- API helper ---------- */
async function api(action, payload){
  if(!API_URL || API_URL.indexOf('PASTE_')===0) throw new Error('API_URL not set');
  let res;
  if(payload){
    res = await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(Object.assign({action,token:state.token},payload))});
  }else{
    const q=new URLSearchParams(Object.assign({action,token:state.token||''}));
    res = await fetch(API_URL+'?'+q.toString());
  }
  const data = await res.json();
  if(!data.ok) throw new Error(data.error||'Request failed');
  return data;
}

/* ---------- state ---------- */
const state = { token:null, user:null, view:'dashboard', leads:null, stats:null, busy:false, showNew:false };
const root = document.getElementById('root');

/* ========================================================================
   RENDER
======================================================================== */
function render(){
  if(!state.user){ renderLogin(); return; }
  renderApp();
}

function renderLogin(){
  const configMissing = !API_URL || API_URL.indexOf('PASTE_')===0;
  root.innerHTML = `
  <div class="login"><div class="login-card">
    <div class="brand"><div class="mark">${I.pen}</div>
      <div><h1>ANVAYA</h1><div class="sub mono">DESIGN · ERP</div></div></div>
    <label>Access token</label>
    <input id="tok" class="input" placeholder="e.g. ADMIN-001" />
    <div style="height:12px"></div>
    <button class="btn" id="go">Sign in ${I.arrow}</button>
    <div id="loginerr"></div>
    ${configMissing ? `<div class="err" style="margin-top:14px">Set <b>API_URL</b> at the top of index.html to your deployed Web App URL first.</div>` : ''}
    <div class="hint">Seeded tokens: <code>ADMIN-001</code> (owner), <code>ARCH-002</code>, <code>SITE-003</code>, <code>DESK-005</code>, <code>CLIENT-004</code>. Switch tokens to see role-based access change.</div>
  </div></div>`;
  document.getElementById('go').onclick = doLogin;
  document.getElementById('tok').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
}

async function doLogin(){
  const tok = document.getElementById('tok').value.trim();
  const errEl = document.getElementById('loginerr');
  if(!tok){ errEl.innerHTML='<div class="err">Enter a token.</div>'; return; }
  errEl.innerHTML='<div class="hint"><span class="spin"></span>Checking…</div>';
  state.token = tok;
  try{
    const d = await api('login');
    state.user = d.user;
    state.view = d.user.modules[0]||'dashboard';
    await load();
    render();
  }catch(err){
    state.token=null;
    errEl.innerHTML='<div class="err">'+err.message+'</div>';
  }
}

function renderApp(){
  const u = state.user;
  const groups = ['Workspace','Sales','Delivery','Records'];
  const nav = groups.map(g=>{
    const items = u.modules.filter(m=>MODGROUP[m]===g);
    if(!items.length) return '';
    return `<div class="nav-group">${g}</div>`+items.map(m=>
      `<button class="nav-item ${state.view===m?'on':''}" data-view="${m}">${MODICON[m]} ${MODLABEL[m]}</button>`).join('');
  }).join('');

  root.innerHTML = `
  <div class="app">
    <aside>
      <div class="side-head"><div class="brand" style="margin:0">
        <div class="mark">${I.pen}</div>
        <div><h1>ANVAYA</h1><div class="sub mono">DESIGN · ERP</div></div></div></div>
      <nav>${nav}</nav>
      <div class="side-foot">
        <button class="btn ghost" id="logout" style="width:100%">Sign out</button>
      </div>
    </aside>
    <main>
      <header class="top">
        <div class="search">${I.search}<span>Search projects, leads…</span></div>
        <div class="who"><div class="avatar">${u.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
          <div style="line-height:1.2"><div style="font-size:13px;font-weight:500">${u.name}</div>
          <div style="font-size:10px;color:var(--faint)">${u.role}</div></div></div>
      </header>
      ${u.role!=='Super Admin' ? `<div class="scope">${I.warn} Viewing as <b>&nbsp;${u.role}</b>&nbsp;— modules and actions are scoped to this role.</div>`:''}
      <div class="content" id="content"></div>
    </main>
  </div>`;

  root.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;state.showNew=false;renderContent();});
  document.getElementById('logout').onclick=()=>{state.token=null;state.user=null;state.leads=null;render();};
  renderContent();
}

function renderContent(){
  // keep nav highlight in sync
  root.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('on',b.dataset.view===state.view));
  const el = document.getElementById('content');
  if(state.view==='dashboard') return renderDashboard(el);
  if(state.view==='leads')     return renderLeads(el);
  return renderStub(el, MODLABEL[state.view]);
}

function renderDashboard(el){
  const s = state.stats;
  el.innerHTML = `
    <h2 class="page">Studio overview</h2>
    <p class="page-sub">Live from your Google Sheet</p>
    <div class="stats" style="margin-top:18px">
      ${stat('Active projects', s?s.activeProjects:'—','in design or execution')}
      ${stat('Open pipeline', s?s.pipeline:'—', s?inr(s.pipelineValue)+' in play':'',  '--blue')}
      ${stat('Portfolio value', s?inr(s.portfolioValue):'—','across active projects')}
      ${stat('You are', state.user.role.split(' ')[0], state.user.name)}
    </div>
    <div class="card" style="padding:18px;color:var(--graphite);font-size:13px;line-height:1.7">
      This shell is live against the API. <b>Leads</b> is the fully-wired module — open it to create, advance, and convert against the real sheet. The other modules are the next slices to wire, each one more table + a few endpoints in <span class="mono">Code.gs</span>.
    </div>`;
}
function stat(l,v,s,color){return `<div class="stat"><div class="l">${l}</div><div class="v" ${color?`style="color:var(${color})"`:''}>${v}</div><div class="s">${s||''}</div></div>`;}

function renderLeads(el){
  const canManage = ['Super Admin','Architect','Admin'].includes(state.user.role);
  el.innerHTML = `
    <div class="row-between">
      <div><h2 class="page">Leads</h2><p class="page-sub">${state.leads?state.leads.length:'…'} in pipeline · advance a lead, convert when approved</p></div>
      ${canManage?`<button class="btn small" id="newbtn">${state.showNew?'Close':I.plus+' New lead'}</button>`:''}
    </div>
    <div class="card">
      ${state.showNew?newLeadForm():''}
      <div class="thead"><div>Lead</div><div>Source</div><div>Value</div><div>Status</div><div class="right">Action</div></div>
      <div id="leadrows">${state.leads?leadRows():'<div class="loading"><span class="spin"></span>Loading from sheet…</div>'}</div>
    </div>
    <p class="hint" style="margin-top:12px">Statuses: ${LEAD_STATUSES.join(' → ')}</p>`;

  if(canManage){
    const nb=document.getElementById('newbtn'); if(nb) nb.onclick=()=>{state.showNew=!state.showNew;renderContent();};
  }
  wireLeadRows();
  if(state.showNew) wireNewForm();
}

function leadRows(){
  if(!state.leads.length) return '<div class="empty">No leads yet.</div>';
  return state.leads.map(l=>{
    const [fg,bg]=TONE[l.status]||TONE.New;
    let action;
    const canManage=['Super Admin','Architect','Admin'].includes(state.user.role);
    if(!canManage) action='<span style="font-size:12px;color:var(--faint)">read-only</span>';
    else if(l.status==='Approved') action=`<button class="btn small green" data-act="convert" data-id="${l.id}">Convert ${I.arrow}</button>`;
    else if(l.status==='Rejected') action='<span style="font-size:12px;color:var(--faint)">closed</span>';
    else action=`<button class="btn ghost small" data-act="advance" data-id="${l.id}">Advance ${I.chev}</button>`;
    return `<div class="trow">
      <div><div style="display:flex;align-items:center;gap:8px"><span class="lead-name">${esc(l.name)}</span><span class="lead-id mono">${l.id}</span></div>
        <div class="lead-brief">${esc(l.brief||'')}${l.city?' · '+esc(l.city):''}</div></div>
      <div class="src">${esc(l.source||'')}</div>
      <div class="val">${inr(l.value)}</div>
      <div><span class="pill" style="color:var(${fg});background:var(${bg})"><span class="dot" style="background:var(${fg})"></span>${l.status}</span></div>
      <div class="right">${action}</div></div>`;
  }).join('');
}

function wireLeadRows(){
  document.querySelectorAll('[data-act]').forEach(b=>{
    b.onclick=async()=>{
      const id=b.dataset.id, act=b.dataset.act;
      b.disabled=true; b.style.opacity=.5; b.innerHTML='<span class="spin"></span>';
      try{
        if(act==='advance'){ const d=await api('leads.advance',{id}); replaceLead(d.lead); }
        if(act==='convert'){ await api('leads.convert',{id}); state.leads=state.leads.filter(x=>x.id!==id); await refreshStats(); }
        renderContent();
      }catch(err){ alert(err.message); renderContent(); }
    };
  });
}
function replaceLead(lead){ state.leads=state.leads.map(x=>x.id===lead.id?lead:x); }

function newLeadForm(){
  return `<div class="newform">
    <div><label>Name</label><input class="input" id="nf-name" placeholder="Client name"></div>
    <div><label>Brief</label><input class="input" id="nf-brief" placeholder="e.g. 3BHK interior"></div>
    <div><label>City</label><input class="input" id="nf-city" placeholder="Area"></div>
    <div><label>Source</label><select class="input" id="nf-source">
      <option>Phone Call</option><option>WhatsApp</option><option>Instagram</option><option>Facebook</option><option>Website</option><option>Reference</option></select></div>
    <div><label>Value (₹)</label><input class="input" id="nf-value" type="number" placeholder="0"></div>
    <div><label>Phone</label><input class="input" id="nf-phone" placeholder="+91…"></div>
    <div class="full"><button class="btn green small" id="nf-save">Save lead</button></div>
  </div>`;
}
function wireNewForm(){
  document.getElementById('nf-save').onclick=async(ev)=>{
    const g=id=>document.getElementById(id).value.trim();
    const payload={name:g('nf-name'),brief:g('nf-brief'),city:g('nf-city'),source:g('nf-source'),value:g('nf-value'),phone:g('nf-phone')};
    if(!payload.name){ alert('Name is required'); return; }
    ev.target.innerHTML='<span class="spin"></span>Saving'; ev.target.disabled=true;
    try{
      const d=await api('leads.create',payload);
      state.leads.unshift(d.lead); state.showNew=false; await refreshStats(); renderContent();
    }catch(err){ alert(err.message); ev.target.disabled=false; ev.target.textContent='Save lead'; }
  };
}

function renderStub(el,label){
  el.innerHTML=`<h2 class="page">${label}</h2><p class="page-sub">Next slice to wire</p>
    <div class="card" style="padding:24px;margin-top:14px;border-style:dashed;color:var(--graphite);font-size:13px;line-height:1.7">
      <b>${label}</b> is built in the prototype and maps to a sheet + a handful of endpoints in <span class="mono">Code.gs</span>.
      Leads is wired first as the reference slice — copy its pattern (list / create / advance) for this module next.
    </div>`;
}

/* ---------- data loaders ---------- */
async function load(){
  await refreshStats();
  if(state.user.modules.includes('leads')){
    try{ const d=await api('leads.list'); state.leads=d.leads; }catch(e){ state.leads=[]; }
  }
}
async function refreshStats(){ try{ const d=await api('stats'); state.stats=d.stats; }catch(e){} }

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

render();
</script>
